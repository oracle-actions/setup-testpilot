name: GH Actions CI/CD

on:
  push:
    tags:
      - '*'
    branches:
      - 'main'
  pull_request:
    branches:
      - 'main'

permissions: { } # none

concurrency:
  group: "workflow = ${{ github.workflow }}, ref = ${{ github.event.ref }}, pr = ${{ github.event.pull_request.id }}"
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.repository != 'oracle-actions/setup-testpilot' }}

jobs:
  build:
    permissions:
      contents: write
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-latest, windows-latest, ubuntu-latest ]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # required for full tag history
          persist-credentials: false
      - name: Check if Git tag exists
        run: echo "HEAD_TAG=$(git tag --points-at HEAD)" >> $GITHUB_ENV
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '23'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
#          cache: 'maven'
          native-image-job-reports: 'true'
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Build with Maven
        run: mvn -B -ntp verify -P native
      - name: Create Linux TAR Gzip archive
        if: success() && matrix.os == 'ubuntu-latest'
        run: |
          cd  ${{ github.workspace }}/target
          tar -cvf ../setup-testpilot-linux-x86_64.tar setup-testpilot ../LICENSE.txt
          cd ..
          gzip ${{ github.workspace }}/setup-testpilot-linux-x86_64.tar
      - name: Create MAC OS TAR Gzip archive
        if: success() && matrix.os == 'macos-latest'
        run: |
          cd  ${{ github.workspace }}/target
          tar -cvf ../setup-testpilot-macos-aarch64.tar setup-testpilot ../LICENSE.txt
          cd ..
          gzip ${{ github.workspace }}/setup-testpilot-macos-aarch64.tar
      - name: Create Windows ZIP archive
        if: success() && matrix.os == 'windows-latest'
        run: Compress-Archive -Path ${{ github.workspace }}\target\setup-testpilot.exe,${{ github.workspace }}\LICENSE.txt -Destination ${{ github.workspace }}\setup-testpilot-windows_x86_64.zip
